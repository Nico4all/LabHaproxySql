#
# HAProxy Configuration para MySQL Load Balancer
# Parte 2: Balanceo de carga con health checks HTTP
#

global
    # Configuración global
    log stdout format raw local0 info
    maxconn 4096
    user haproxy
    group haproxy
    
    # Timeouts globales
    stats timeout 30s

defaults
    # Configuración por defecto para todos los frontends/backends
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    
    # Timeouts
    timeout connect 10s
    timeout client  1h
    timeout server  1h
    timeout check   5s
    
    # Retries
    retries 3

#
# Dashboard de Estadísticas
# Acceso: http://localhost:8080/stats
# Usuario/Contraseña: admin/admin123
#
listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:admin123
    stats refresh 5s
    stats show-legends
    stats show-node

#
# Frontend: ESCRITURA
# Puerto: 3307
# Backend: Solo el maestro MySQL (read_only=OFF)
#
frontend mysql_write
    bind *:3307
    mode tcp
    option tcplog
    default_backend mysql_master_backend
    
    # Logging
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"

#
# Frontend: LECTURA
# Puerto: 3308
# Backend: Esclavos MySQL con round-robin (read_only=ON)
#
frontend mysql_read
    bind *:3308
    mode tcp
    option tcplog
    default_backend mysql_slaves_backend
    
    # Logging
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"

#
# Backend: MAESTRO (Escritura)
# Solo hay un servidor, todas las escrituras van aquí
#
backend mysql_master_backend
    mode tcp
    balance roundrobin
    
    # Health check HTTP
    # - Intervalo: cada 2 segundos
    # - Rise: 2 checks exitosos para marcar como UP
    # - Fall: 3 checks fallidos para marcar como DOWN
    option httpchk GET /
    http-check expect status 200
    
    # Servidor maestro
    server mysql-master 172.20.0.10:3306 check port 9200 inter 2s rise 2 fall 3

#
# Backend: ESCLAVOS (Lectura)
# Round-robin entre todos los esclavos disponibles
#
backend mysql_slaves_backend
    mode tcp
    balance roundrobin
    
    # Health check HTTP
    # Los esclavos verifican:
    # - MySQL está vivo
    # - IO thread = Yes
    # - SQL thread = Yes
    # - Lag < 30 segundos
    option httpchk GET /
    http-check expect status 200
    
    # Servidores esclavos
    server mysql-slave1 172.20.0.11:3306 check port 9201 inter 2s rise 2 fall 3
    server mysql-slave2 172.20.0.12:3306 check port 9202 inter 2s rise 2 fall 3
