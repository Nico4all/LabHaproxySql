#
# HAProxy Configuration para MySQL Load Balancer
# Parte 2: Balanceo de carga con health checks HTTP
#

global
    # Configuración global
    log stdout format raw local0 info
    maxconn 4096
    user haproxy
    group haproxy
    
    # Timeouts globales
    stats timeout 30s

defaults
    # Configuración por defecto para todos los frontends/backends
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    
    # Timeouts
    timeout connect 10s
    timeout client  1h
    timeout server  1h
    timeout check   5s
    
    # Retries
    retries 3

#
# Dashboard de Estadísticas
# Acceso: http://localhost:8080/stats
# Usuario/Contraseña: admin/admin123
#
listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:admin123
    stats refresh 5s
    stats show-legends
    stats show-node

#
# Frontend: ESCRITURA
# Puerto: 3307
# Backend: Solo el maestro MySQL (read_only=OFF)
#
frontend mysql_write
    bind *:3307
    mode tcp
    option tcplog
    default_backend mysql_master_backend
    
    # Logging
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"

#
# Frontend: LECTURA
# Puerto: 3308
# Backend: Esclavos MySQL con round-robin (read_only=ON)
#
frontend mysql_read
    bind *:3308
    mode tcp
    option tcplog
    default_backend mysql_slaves_backend
    
    # Logging
    log-format "%ci:%cp [%t] %ft %b/%s %Tw/%Tc/%Tt %B %ts %ac/%fc/%bc/%sc/%rc %sq/%bq"

#
# Backend: MAESTRO (Escritura)
# Solo hay un servidor, todas las escrituras van aquí
#
backend mysql_master_backend
    mode tcp
    option tcp-check
    tcp-check connect port 9200
    tcp-check send GET\ /\ HTTP/1.0\r\n\r\n
    tcp-check expect string OK
    server mysql-master mysql-master:3306 check inter 3s fall 3 rise 2

backend mysql_slaves_backend
    mode tcp
    balance roundrobin
    option tcp-check
    tcp-check connect port 9200
    tcp-check send GET\ /\ HTTP/1.0\r\n\r\n
    tcp-check expect string OK
    server mysql-slave1 mysql-slave1:3306 check inter 3s fall 3 rise 2
    server mysql-slave2 mysql-slave2:3306 check inter 3s fall 3 rise 2
